# ==========================================
# PROJECT METADATA
# ==========================================
sonar.projectKey=Tugamer89_AC-Virtual-Engineer
sonar.organization=tugamer89

sonar.projectName=AC Virtual Engineer
sonar.projectVersion=0.1.1 # x-release-please-version

# ==========================================
# SOURCES
# ==========================================
sonar.sources=backend, frontend
# sonar.tests=tests, frontend/tests

# ==========================================
# EXCLUSIONS
# ==========================================
sonar.exclusions=**/node_modules/**, **/dist/**, **/build/**, **/.venv/**, **/venv/**, **/__pycache__/**, frontend/public/**, **/*.svg, **/*.ico, **/*.json
sonar.test.exclusions=**/*.spec.ts, **/*.spec.tsx, **/*.test.ts, **/*.test.tsx, **/*.test.py

# ==========================================
# PYTHON (Backend)
# ==========================================
sonar.python.version=3.11
# sonar.python.coverage.reportPaths=coverage.xml

# ==========================================
# TYPESCRIPT/VITE (Frontend)
# ==========================================
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ==========================================
# GENERAL SETTINGS
# ==========================================
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true

name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag of the old release (e.g., v0.1.1). Leave blank to build without uploading.'
        required: false
        type: string

jobs:
  build:
    name: Build on ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os-name: Linux
            artifact_name: acve-backend-linux
            executable_name: acve-backend
          - os: windows-latest
            os-name: Windows
            artifact_name: acve-backend-windows
            executable_name: acve-backend.exe
          - os: macos-latest
            os-name: macOS
            artifact_name: acve-backend-macos
            executable_name: acve-backend

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-dev portaudio19-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Compile Backend with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
                      --name="${{ matrix.executable_name }}" \
                      --windowed \
                      --hidden-import=pyttsx3.drivers \
                      --hidden-import=pyttsx3.drivers.sapi5 \
                      --hidden-import=pyttsx3.drivers.espeak \
                      --hidden-import=pyttsx3.drivers.nsss \
                      backend/server.py

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ matrix.executable_name }}

      - name: Upload binary to Release
        if: github.event_name == 'release' || github.event.inputs.tag_name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist/${{ matrix.executable_name }}

name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag of the old release (e.g., v0.1.1). Leave blank to build without uploading."
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
            arch: amd64
            ext: ""
            path_sep: ":"
          - os: macos-latest
            os_name: macos
            arch: amd64
            ext: ""
            path_sep: ":"
          - os: windows-latest
            os_name: windows
            arch: amd64
            ext: ".exe"
            path_sep: ";"

    env:
      executable_name: acve-backend-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/requirements-dev.txt"

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-dev portaudio19-dev

      - name: Install Python Dependencies
        run: |
          pip install --only-binary :all: --require-hashes -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Generate version_info.txt dynamically
        run: python backend/scripts/generate_version.py

      - name: Generate .env file
        shell: bash
        env:
          MQTT_HOST: ${{ secrets.MQTT_HOST }}
          MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
        run: |
          echo "MQTT_HOST=$MQTT_HOST" > backend/.env
          echo "MQTT_USERNAME=$MQTT_USERNAME" >> backend/.env
          echo "MQTT_PASSWORD=$MQTT_PASSWORD" >> backend/.env

      - name: Compile Backend with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --console \
                      --name="${{ env.executable_name }}" \
                      --add-data="backend/.env${{ matrix.path_sep }}." \
                      --hidden-import=pyttsx3.drivers \
                      --hidden-import=pyttsx3.drivers.sapi5 \
                      --hidden-import=pyttsx3.drivers.espeak \
                      --hidden-import=pyttsx3.drivers.nsss \
                      --icon=frontend/public/favicon.ico \
                      --version-file=version_info.txt \
                      backend/server.py

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ env.executable_name }}

      - name: Upload binary to Release
        if: github.event_name == 'release' || github.event.inputs.tag_name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist/${{ env.executable_name }}

name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag of the old release (e.g., v0.1.1). Leave blank to build without uploading.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
            arch: amd64
            ext: ""
          - os: macos-latest
            os_name: macos
            arch: amd64 
            ext: ""
          - os: windows-latest
            os_name: windows
            arch: amd64
            ext: ".exe"
    
    env:
        executable_name: acve-backend-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-dev portaudio19-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Generate version_info.txt dynamically
        shell: python
        run: |
          import json
          
          with open('.release-please-manifest.json', 'r') as f:
              version = json.load(f).get(".", "0.1.1")
              
          parts = version.split('-')[0].split('.')
          v_tuple = f"{parts[0]}, {parts[1]}, {parts[2]}, 0"
          
          template = f"""VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=({v_tuple}),
              prodvers=({v_tuple}),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
              ),
            kids=[
              StringFileInfo(
                [
                StringTable(
                  '040904B0',
                  [StringStruct('CompanyName', 'Tugamer89'),
                  StringStruct('FileDescription', 'AC Virtual Engineer Server'),
                  StringStruct('FileVersion', '{version}'),
                  StringStruct('InternalName', 'ac_virtual_engineer'),
                  StringStruct('LegalCopyright', 'Copyright (c) 2026'),
                  StringStruct('OriginalFilename', 'ac_virtual_engineer.exe'),
                  StringStruct('ProductName', 'AC Virtual Engineer'),
                  StringStruct('ProductVersion', '{version}')])
                ]),
              VarFileInfo([VarStruct('Translation', [1033, 1200])])
            ]
          )
          """
          
          with open('version_info.txt', 'w') as f:
              f.write(template)
          
          print(f"File version_info.txt successfully generated for the version {version}")

      - name: Compile Backend with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --console \
                      --name="${{ env.executable_name }}" \
                      --hidden-import=pyttsx3.drivers \
                      --hidden-import=pyttsx3.drivers.sapi5 \
                      --hidden-import=pyttsx3.drivers.espeak \
                      --hidden-import=pyttsx3.drivers.nsss \
                      --icon=frontend/public/favicon.svg \
                      --version-file=version_info.txt \
                      backend/server.py

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ env.executable_name }}

      - name: Upload binary to Release
        if: github.event_name == 'release' || github.event.inputs.tag_name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist/${{ env.executable_name }}

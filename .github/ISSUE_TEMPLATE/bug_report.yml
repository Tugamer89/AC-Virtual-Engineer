name: Bug Report
description: Create a report to help us improve the Virtual Engineer
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start the backend with '...'
        2. Start Assetto Corsa session on track '...'
        3. Do '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or backend logs to help explain your problem.
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, WSL Ubuntu
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Environment Versions
      description: Please provide the versions of Python, Node, and Assetto Corsa / Mods.
      placeholder: e.g. Python 3.13, Node 18.16, Assetto Corsa + CSP 0.1.79
    validations:
      required: true
